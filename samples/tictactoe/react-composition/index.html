<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic-Tac-Toe — Composition &amp; Encapsulation 🎮</title>

  <!--
    ========================================================================
    SESSION 2 — CLASSES, COMPOSITION & ENCAPSULATION (visual edition)
    ------------------------------------------------------------------------
    The whole point of this file is to SEE composition and encapsulation, not
    just read about them. We build the UI bottom-up, the way OO design builds
    objects bottom-up:

        Square  ──composed into──▶  Row  ──composed into──▶  Board  ──▶  Game
        (one cell)                  (3 cells)                (3 rows)    (state)

    • ENCAPSULATION lives in <Square>: a square owns how it looks and what it
      does when clicked. Nobody reaches inside it.
    • COMPOSITION (HAS-A) is every arrow above: a Row HAS-A set of Squares, a
      Board HAS-A set of Rows, a Game HAS-A Board. Bigger things are built OUT
      OF smaller things — never by inheritance (a Board is not a kind of Row).
    • The WIN CONDITION belongs to the whole BOARD — only the board can see all
      three rows and three columns at once.

    Runs with NO build step: just open this file in a browser. (React + Babel
    load from a CDN, so you need an internet connection the first time.)
    ========================================================================
  -->

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root { --line:#334155; --ink:#0f172a; --x:#2563eb; --o:#db2777; --win:#bbf7d0; }
    * { box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f8fafc; color: var(--ink); margin: 0;
      min-height: 100vh; display: grid; place-items: center; padding: 2rem;
    }
    .wrap { text-align: center; }
    h1 { font-size: 1.25rem; margin: 0 0 .25rem; }
    .sub { color: #64748b; font-size: .85rem; margin: 0 0 1.25rem; }
    .status { font-size: 1.1rem; font-weight: 600; height: 1.6rem; margin-bottom: .9rem; }

    /* A ROW is a horizontal band of three Squares. */
    .row { display: flex; justify-content: center; }

    /* A SQUARE: one cell. It styles and behaves as a self-contained unit. */
    .square {
      width: 84px; height: 84px; margin: 4px;
      font-size: 2.4rem; font-weight: 700; line-height: 1;
      background: #fff; border: 2px solid var(--line); border-radius: 12px;
      cursor: pointer; transition: transform .06s, background .15s;
      display: grid; place-items: center;
    }
    .square:hover:not(:disabled) { transform: translateY(-2px); background: #f1f5f9; }
    .square:disabled { cursor: default; }
    .square.x { color: var(--x); }
    .square.o { color: var(--o); }
    .square.win { background: var(--win); border-color: #16a34a; }

    .reset {
      margin-top: 1.2rem; padding: .55rem 1.1rem; font-size: .9rem; font-weight: 600;
      color: #fff; background: var(--ink); border: none; border-radius: 10px; cursor: pointer;
    }
    .reset:hover { background: #1e293b; }
    .legend { margin-top: 1.5rem; font-size: .78rem; color: #64748b; line-height: 1.6; }
    code { background: #e2e8f0; padding: .05rem .35rem; border-radius: 5px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    // ========================================================================
    // WIN CONDITION — belongs to the BOARD as a whole.
    // A single Square can't know if "it" won; only something that can see ALL
    // nine cells (every row, column, and diagonal) can decide. So the win logic
    // lives at the board level, not the cell level.
    // ========================================================================
    const LINES = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],   // rows
      [0, 3, 6], [1, 4, 7], [2, 5, 8],   // columns
      [0, 4, 8], [2, 4, 6],              // diagonals
    ];

    function calculateWinner(cells) {
      for (const [a, b, c] of LINES) {
        if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) {
          return { mark: cells[a], line: [a, b, c] };   // who won + which line
        }
      }
      return null;
    }

    // ========================================================================
    // <Square> — ENCAPSULATION: one cell, owning its own appearance and click.
    // It is handed only what it needs (its value, whether it's a winning cell,
    // whether the game is locked, and a way to report a click). It does NOT
    // know about the board, the rules, or the other cells. That ignorance is
    // encapsulation — the cell is a sealed unit you can drop in anywhere.
    // ========================================================================
    function Square({ value, isWinning, locked, onPlay }) {
      const cls =
        "square" +
        (value === "X" ? " x" : value === "O" ? " o" : "") +
        (isWinning ? " win" : "");
      return (
        <button
          className={cls}
          disabled={locked || value !== ""}   // a cell decides it can't be re-played
          onClick={onPlay}                     // it just reports "I was clicked"
        >
          {value}
        </button>
      );
    }

    // ========================================================================
    // <Row> — COMPOSITION: a row HAS three Squares. Nothing more.
    // It owns no game logic; it just arranges three cells horizontally and
    // passes each one the slice of props it needs.
    // ========================================================================
    function Row({ rowIndex, cells, winningLine, locked, onPlay }) {
      return (
        <div className="row">
          {[0, 1, 2].map((col) => {
            const index = rowIndex * 3 + col;        // map (row,col) → 0..8
            return (
              <Square
                key={index}
                value={cells[index]}
                isWinning={winningLine?.includes(index) ?? false}
                locked={locked}
                onPlay={() => onPlay(index)}
              />
            );
          })}
        </div>
      );
    }

    // ========================================================================
    // <Board> — COMPOSITION: a board HAS three Rows. And it owns the one thing
    // only the whole board can compute: the WIN CONDITION.
    // (Note: ROWS are the composition unit. COLUMNS aren't a separate component
    //  — the same squares can't be owned by both a row and a column — so
    //  columns live purely in the win-condition lines above.)
    // ========================================================================
    function Board({ cells, onPlay }) {
      const winner = calculateWinner(cells);          // win condition: board-level
      const isDraw = !winner && cells.every((c) => c !== "");
      const locked = Boolean(winner) || isDraw;

      const status = winner
        ? `Winner: ${winner.mark} 🎉`
        : isDraw
        ? "Draw — nobody wins"
        : null;

      return (
        <div>
          {status && <div className="status">{status}</div>}
          {!status && <Turn cells={cells} />}
          {[0, 1, 2].map((rowIndex) => (
            <Row
              key={rowIndex}
              rowIndex={rowIndex}
              cells={cells}
              winningLine={winner?.line}
              locked={locked}
              onPlay={onPlay}
            />
          ))}
        </div>
      );
    }

    // Tiny presentational helper — whose turn is it?
    function Turn({ cells }) {
      const xs = cells.filter((c) => c === "X").length;
      const os = cells.filter((c) => c === "O").length;
      const next = xs === os ? "X" : "O";
      return <div className="status">Turn: {next}</div>;
    }

    // ========================================================================
    // <Game> — the top of the composition tree. It HAS-A Board and owns the
    // game STATE (the nine cells). When a cell reports a click, the Game is the
    // one piece that knows the rules: figure out whose turn it is, write the
    // mark immutably, and hand the new board back down to be re-rendered.
    // ========================================================================
    function Game() {
      const [cells, setCells] = useState(Array(9).fill(""));

      function handlePlay(index) {
        if (cells[index] !== "" || calculateWinner(cells)) return; // guard
        const xs = cells.filter((c) => c === "X").length;
        const os = cells.filter((c) => c === "O").length;
        const mark = xs === os ? "X" : "O";

        const next = cells.slice();   // copy — never mutate state in place
        next[index] = mark;
        setCells(next);
      }

      return (
        <div className="wrap">
          <h1>Tic-Tac-Toe</h1>
          <p className="sub">Square → Row → Board → Game · composition &amp; encapsulation</p>

          <Board cells={cells} onPlay={handlePlay} />

          <button className="reset" onClick={() => setCells(Array(9).fill(""))}>
            ↺ New game
          </button>

          <div className="legend">
            <div><b>Encapsulation:</b> a <code>Square</code> owns its look &amp; click — it knows nothing of the board.</div>
            <div><b>Composition (HAS-A):</b> <code>Row</code> has Squares · <code>Board</code> has Rows · <code>Game</code> has a Board.</div>
            <div><b>Win condition:</b> only the whole <code>Board</code> can see every row, column &amp; diagonal.</div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Game />);
  </script>
</body>
</html>
